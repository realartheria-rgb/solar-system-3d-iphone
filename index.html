<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Solar System 3D - iPhone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  overflow: hidden; position: fixed; inset: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff; width: 100%; height: 100%;
  touch-action: none; overscroll-behavior: none;
}
#app { position: fixed; inset: 0; }
#app canvas { display: block; width: 100%; height: 100%; }

#splash {
  position: fixed; inset: 0; z-index: 1000;
  background: radial-gradient(ellipse at center, #0a0f1a 0%, #000 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 1s ease, visibility 1s ease;
}
#splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#splash h1 { font-size: clamp(1.3rem, 5vw, 2rem); font-weight: 300; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
#splash p { color: #88aacc; margin-bottom: 1.6rem; font-size: 13px; }
.loader { width: 160px; height: 3px; background: rgba(100,150,255,0.2); border-radius: 2px; overflow: hidden; }
.loader::after { content: ''; display: block; width: 100%; height: 100%; background: linear-gradient(90deg, #4a8ce0, #7ec4ff); animation: loading 2s ease-in-out; }
@keyframes loading { from { transform: translateX(-100%); } to { transform: translateX(0); } }

#ui {
  position: fixed;
  top: env(safe-area-inset-top, 10px);
  left: 10px; right: 10px;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
}
.pill {
  pointer-events: auto;
  background: rgba(20,25,40,0.85);
  border: 1px solid rgba(100,120,180,0.4);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  color: #cfe6ff;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.icon-btn {
  pointer-events: auto;
  width: 46px; height: 46px;
  border-radius: 14px;
  background: rgba(20,25,40,0.85);
  border: 1px solid rgba(100,120,180,0.4);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  color: #cfe6ff;
  font-size: 22px;
  display: grid;
  place-items: center;
  touch-action: manipulation;
}

#controls {
  position: fixed;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.cbtn {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: rgba(20,25,40,0.85);
  border: 1px solid rgba(100,120,180,0.4);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  color: #cfe6ff;
  font-size: 24px;
  display: grid;
  place-items: center;
  touch-action: manipulation;
}
.cbtn:active { background: rgba(60,100,180,0.9); transform: scale(0.94); }

/* Info panel for mobile */
#infoPanel {
  position: fixed;
  left: 10px; right: 10px;
  bottom: calc(env(safe-area-inset-bottom, 14px) + 54px);
  z-index: 200;
  background: rgba(10,15,30,0.92);
  border: 1px solid rgba(100,120,180,0.4);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 16px 18px;
  opacity: 0; visibility: hidden;
  transform: translateY(10px);
  transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
  max-height: 40vh;
  overflow-y: auto;
}
#infoPanel.show { opacity: 1; visibility: visible; transform: translateY(0); }
#infoPanel .close {
  position: absolute; top: 8px; right: 12px;
  width: 36px; height: 36px;
  display: grid; place-items: center;
  font-size: 22px; color: #8aa0c0;
  cursor: pointer; touch-action: manipulation;
}
#infoPanel .name { font-size: 20px; font-weight: 700; color: #7ec4ff; margin-bottom: 6px; padding-right: 40px; }
#infoPanel .desc { font-size: 15px; color: #cfe6ff; margin-bottom: 10px; line-height: 1.4; }
#infoPanel .facts { font-size: 14px; color: #a0b8d8; line-height: 1.55; padding-top: 8px; border-top: 1px solid rgba(100,120,180,0.25); }

/* Tooltip for desktop hover */
#tooltip {
  position: fixed;
  left: 10px;
  bottom: calc(env(safe-area-inset-bottom, 16px) + 44px);
  z-index: 100;
  background: rgba(0,0,0,0.75);
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 11px;
  line-height: 1.5;
  max-width: 260px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  border: 1px solid rgba(100,120,180,0.3);
}
#tooltip.show { opacity: 1; }
#tooltip .name { font-weight: 700; color: #7ec4ff; margin-bottom: 3px; }
#tooltip .facts { color: #cfe6ff; margin-top: 4px; font-size: 11px; }

#hint {
  position: fixed;
  left: 0; right: 0;
  bottom: env(safe-area-inset-bottom, 14px);
  text-align: center;
  z-index: 100;
  pointer-events: none;
  font-size: 14px;
  color: rgba(200,220,255,0.75);
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}
</style>
</head>
<body>
<div id="app">
  <div id="splash">
    <h1>Солнечная система 3D</h1>
    <p>Подготовка сцены...</p>
    <div class="loader"></div>
  </div>

  <div id="ui">
    <div class="pill" id="titlePill">🌍 Солнечная система</div>
    <div style="display:flex; gap:8px;">
      <button class="icon-btn" id="btnPause" aria-label="Пауза">⏯</button>
      <button class="icon-btn" id="btnReset" aria-label="Сброс">↺</button>
    </div>
  </div>

  <div id="controls">
    <button class="cbtn" id="btnZoomIn" aria-label="Увеличить">＋</button>
    <button class="cbtn" id="btnZoomOut" aria-label="Уменьшить">－</button>
    <button class="cbtn" id="btnTop" aria-label="Сверху">⤒</button>
    <button class="cbtn" id="btnPrev" aria-label="Назад">‹</button>
    <button class="cbtn" id="btnNext" aria-label="Вперёд">›</button>
  </div>

  <div id="infoPanel">
    <div class="close" id="btnClosePanel">✕</div>
    <div class="name" id="ipName"></div>
    <div class="desc" id="ipDesc"></div>
    <div class="facts" id="ipFacts"></div>
  </div>

  <div id="tooltip">
    <div class="name" id="ttName"></div>
    <div id="ttDesc" style="color:#cfe6ff; font-size:12px;"></div>
    <div class="facts" id="ttFacts"></div>
  </div>

  <div id="hint">Тап по планете / свайп для поворота / pinch для зума</div>
</div>

  ctx.fillRect(0, 0, 256, 256);
  var glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false, transparent: true, opacity: 0.9 }));
  glow.scale.set(110, 110, 1);
  sun.add(glow);
}

function createPlanets() {
  PLANET_DATA.forEach(function(data) {
    var geo = new THREE.SphereGeometry(data.size, 40, 40);
    var mat = new THREE.MeshStandardMaterial({ map: createTexture(data.baseColor), roughness: 0.65, metalness: 0.05 });
    var planet = new THREE.Mesh(geo, mat);
    var angle = Math.random() * Math.PI * 2;
    planet.position.x = Math.cos(angle) * data.distance;
    planet.position.z = Math.sin(angle) * data.distance;
    planet.userData = Object.assign({}, data, { angle: angle });
    scene.add(planet);
    planets.push(planet);
    createOrbit(data.distance);
    createLabel(data.name, planet.position);

    if (data.rings) {
      var ring = new THREE.Mesh(
        new THREE.RingGeometry(data.size * 1.5, data.size * 2.5, 64),
        new THREE.MeshBasicMaterial({ color: 0xd6c89e, side: THREE.DoubleSide, transparent: true, opacity: 0.7, depthWrite: false })
      );
      ring.rotation.x = Math.PI * 0.5;
      planet.add(ring);
    }

    if (Array.isArray(data.moons)) {
      data.moons.forEach(function(m) {
        var mesh = new THREE.Mesh(
          new THREE.SphereGeometry(m.size, 24, 24),
          new THREE.MeshStandardMaterial({ map: createTexture(m.color || '#cccccc', 128), roughness: 0.9 })
        );
        mesh.userData = Object.assign({}, m, { parentPlanet: planet, angle: Math.random() * Math.PI * 2 });
        scene.add(mesh);
        moons.push(mesh);
      });
    }
  });
}

function createOrbit(radius) {
  var pts = [];
  for (var i = 0; i <= 96; i++) {
    var a = (i / 96) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
  }
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0x8aaacc, transparent: true, opacity: 0.6 })));
}

function createLabel(name, position) {
  var c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  var ctx = c.getContext('2d');
  ctx.font = 'bold 20px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(200,220,255,0.9)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name, 128, 32);
  var sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthTest: false }));
  sprite.scale.set(18, 4.5, 1);
  sprite.position.set(position.x, 0, position.z);
  sprite.userData = { name: name };
  scene.add(sprite);
  labels.push(sprite);
}

function createAsteroids() {
  var n = 800;
  var inner = 105, outer = 118;
  for (var i = 0; i < n; i++) {
    var angle = Math.random() * Math.PI * 2;
    var r = inner + Math.random() * (outer - inner);
    var mesh = new THREE.Mesh(
      new THREE.SphereGeometry(Math.random() * 0.2 + 0.08, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x9a9488, roughness: 0.9 })
    );
    mesh.position.set(Math.cos(angle) * r, (Math.random() - 0.5) * 2.5, Math.sin(angle) * r);
    mesh.userData = { isAsteroid: true, angle: angle, radius: r, speed: 0.0008 + Math.random() * 0.0004 };
    scene.add(mesh);
    asteroids.push(mesh);
  }
}

function createComets() {
  var cometData = [
    { name: 'Комета Галлея', size: 0.5, distance: 160, speed: 0.0025, tilt: 0.15 },
    { name: 'Комета Хейла-Боппа', size: 0.7, distance: 190, speed: 0.002, tilt: -0.2 },
    { name: 'Комета Веста', size: 0.5, distance: 140, speed: 0.003, tilt: 0.25 }
  ];
  cometData.forEach(function(c) {
    var group = new THREE.Group();
    group.add(new THREE.Mesh(
      new THREE.SphereGeometry(c.size, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0xc9d8e8, roughness: 0.8 })
    ));

    var tc = document.createElement('canvas');
    tc.width = 256; tc.height = 128;
    var tx = tc.getContext('2d');
    var tg = tx.createLinearGradient(0, 0, 256, 0);
    tg.addColorStop(0, 'rgba(180,220,255,0.95)');
    tg.addColorStop(0.4, 'rgba(120,180,220,0.5)');
    tg.addColorStop(1, 'rgba(60,100,140,0)');
    tx.fillStyle = tg;
    tx.fillRect(0, 40, 256, 48);

    var tail = new THREE.Mesh(
      new THREE.PlaneGeometry(18, 7.2),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(tc), transparent: true, depthWrite: false, side: THREE.DoubleSide })
    );
    tail.position.set(-12, 0, 0);
    group.add(tail);

    group.rotation.z = c.tilt || 0;
    group.userData = Object.assign({ isComet: true }, c);
    scene.add(group);
    comets.push(group);
  });
}

function setupLights() {
  scene.add(new THREE.AmbientLight(0xffffff, 1.1));
  var sun = new THREE.PointLight(0xffffff, 5, 900);
  sun.position.set(0, 0, 0);
  scene.add(sun);
  var fill = new THREE.DirectionalLight(0x99bbff, 1.1);
  fill.position.set(80, 40, 100);
  scene.add(fill);
}

function hitTest(x, y) {
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  return raycaster.intersectObjects(planets);
}

function bindEvents() {
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / Math.max(window.innerHeight, 1);
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Touch: show info panel + focus
  window.addEventListener('touchend', function(e) {
    if (!e.changedTouches || e.changedTouches.length !== 1) return;
    var t = e.changedTouches[0];
    var hits = hitTest(t.clientX, t.clientY);
    if (hits.length) {
      showInfoPanel(hits[0].object.userData);
      focusPlanet(hits[0].object);
    }
  }, { passive: true });

  window.addEventListener('touchmove', function() {
    hideInfoPanel();
  }, { passive: true });

  // Mouse: show tooltip on hover
  window.addEventListener('mousemove', function(e) {
    var hits = hitTest(e.clientX, e.clientY);
    var tooltip = document.getElementById('tooltip');
    if (hits.length) {
      var d = hits[0].object.userData;
      document.getElementById('ttName').textContent = d.name || '—';
      document.getElementById('ttDesc').textContent = d.desc || '';
      document.getElementById('ttFacts').textContent = d.facts || '';
      tooltip.classList.add('show');
    } else {
      tooltip.classList.remove('show');
    }
  });

  // Close info panel
  document.getElementById('btnClosePanel').addEventListener('click', hideInfoPanel);
  document.getElementById('btnClosePanel').addEventListener('touchend', function(e) {
    e.preventDefault();
    hideInfoPanel();
  });

  // Control buttons
  document.getElementById('btnPause').addEventListener('click', function() {
    paused = !paused;
    document.getElementById('btnPause').textContent = paused ? '▶' : '⏯';
    document.getElementById('hint').textContent = paused ? 'Пауза' : 'Тап по планете / свайп для поворота / pinch для зума';
  });

  document.getElementById('btnReset').addEventListener('click', resetView);
  document.getElementById('btnZoomIn').addEventListener('click', function() { zoomBy(-22); });
  document.getElementById('btnZoomOut').addEventListener('click', function() { zoomBy(22); });
  document.getElementById('btnTop').addEventListener('click', topView);
  document.getElementById('btnPrev').addEventListener('click', function() { travel(-1); });
  document.getElementById('btnNext').addEventListener('click', function() { travel(1); });
}

var travelIndex = 0;
function focusPlanet(planet) {
  var idx = planets.indexOf(planet);
  if (idx >= 0) {
    travelIndex = idx;
    applyFocus(planet);
  }
}

function applyFocus(planet) {
  var pos = planet.position;
  var offset = new THREE.Vector3(0, planet.userData.size * 1.8, planet.userData.size * 2.6);
  var targetCam = pos.clone().add(offset);
  var startCam = camera.position.clone();
  var startTarget = controls.target.clone();
  var endTarget = pos.clone();
  var t = 0;
  (function step() {
    t += 0.04;
    if (t >= 1) {
      camera.position.copy(targetCam);
      controls.target.copy(endTarget);
      return;
    }
    camera.position.lerpVectors(startCam, targetCam, t);
    controls.target.lerpVectors(startTarget, endTarget, t);
    requestAnimationFrame(step);
  })();
}

function travel(dir) {
  if (!planets.length) return;
  travelIndex = (travelIndex + dir + planets.length) % planets.length;
  applyFocus(planets[travelIndex]);
}

function resetView() {
  var start = camera.position.clone();
  var end = new THREE.Vector3(0, 90, 180);
  var startTarget = controls.target.clone();
  var endTarget = new THREE.Vector3(0, 0, 0);
  var t = 0;
  (function step() {
    t += 0.04;
    if (t >= 1) {
      camera.position.copy(end);
      controls.target.copy(endTarget);
      return;
    }
    camera.position.lerpVectors(start, end, t);
    controls.target.lerpVectors(startTarget, endTarget, t);
    requestAnimationFrame(step);
  })();
}

function zoomBy(delta) {
  var dir = camera.position.clone().sub(controls.target).normalize();
  camera.position.add(dir.multiplyScalar(delta));
}

function topView() {
  var start = camera.position.clone();
  var target = controls.target.clone();
  var end = target.clone().add(new THREE.Vector3(0, 160, 0.01));
  var t = 0;
  (function step() {
    t += 0.04;
    if (t >= 1) {
      camera.position.copy(end);
      controls.target.copy(target);
      return;
    }
    camera.position.lerpVectors(start, end, t);
    controls.target.copy(target);
    requestAnimationFrame(step);
  })();
}

function animate() {
  if (!initialized) return;
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.1);

  if (!paused) {
    planets.forEach(function(p) {
      p.userData.angle += p.userData.speed * dt;
      p.position.x = Math.cos(p.userData.angle) * p.userData.distance;
      p.position.z = Math.sin(p.userData.angle) * p.userData.distance;
      p.rotation.y += 0.003 * dt;
    });

    labels.forEach(function(l) {
      var planet = planets.find(function(p) { return p.userData.name === l.userData.name; });
      if (planet) {
        l.position.x = planet.position.x;
        l.position.z = planet.position.z;
        l.position.y = planet.userData.size + 4;
      }
    });

    moons.forEach(function(m) {
      var parent = m.userData.parentPlanet;
      if (!parent) return;
      m.userData.angle += m.userData.speed * dt;
      m.position.x = parent.position.x + Math.cos(m.userData.angle) * m.userData.distance;
      m.position.z = parent.position.z + Math.sin(m.userData.angle) * m.userData.distance;
      m.position.y = parent.position.y;
    });

    asteroids.forEach(function(a) {
      a.userData.angle += a.userData.speed * dt;
      a.position.x = Math.cos(a.userData.angle) * a.userData.radius;
      a.position.z = Math.sin(a.userData.angle) * a.userData.radius;
    });

    comets.forEach(function(c) {
      c.userData.angle += c.userData.speed * dt;
      var r = c.userData.distance || 160;
      c.position.x = Math.cos(c.userData.angle) * r;
      c.position.z = Math.sin(c.userData.angle) * r;
    });
  }

  controls.update();
  renderer.render(scene, camera);
}

// Wait for Three.js to load, then init
var threeLoadAttempts = 0;
function waitForThree() {
  if (window.THREE) {
    init();
  } else {
    threeLoadAttempts++;
    if (threeLoadAttempts > 50) {
      document.getElementById('splash').innerHTML = '<h1>Ошибка загрузки</h1><p>Three.js не загрузился. Проверьте подключение к интернету.</p>';
      return;
    }
    setTimeout(waitForThree, 200);
  }
}
waitForThree();
</script>
